[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Checkout calls /api/* (the Express server in server/). Netlify is static-only, so host that
# server separately (Render/Railway) and uncomment this proxy with your backend URL:
# [[redirects]]
#   from = "/api/*"
#   to = "https://YOUR-BACKEND.onrender.com/api/:splat"
#   status = 200
#   force = true

# SPA fallback for client-side routing (keep last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
